name: Generate Profile SVGs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SNK_GITHUB_TOKEN: ${{ secrets.SNK_GITHUB_TOKEN }}

    steps:
      - name: Check token exists
        run: |
          if [ -z "$SNK_GITHUB_TOKEN" ]; then
            echo "Missing SNK_GITHUB_TOKEN secret"
            exit 1
          fi

      - name: Generate blue contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: yousfimh
          github_token: ${{ secrets.SNK_GITHUB_TOKEN }}
          outputs: |
            dist/github-snake-blue-light.svg?color_snake=%230969da&color_dots=%23ebf5ff,%23cfe8ff,%237cc0ff,%232f81f7,%230969da
            dist/github-snake-blue-dark.svg?color_snake=%2358a6ff&color_dots=%230d1117,%230d419d,%230969da,%231f6feb,%2358a6ff

      - name: Generate old-style private stats cards
        run: |
          python3 <<'PY'
          import os
          import json
          import html
          import urllib.request
          import datetime as dt

          TOKEN = os.environ["SNK_GITHUB_TOKEN"]
          DISPLAY_NAME = "Yousfi Mohamed Houssam"
          OUT = "dist"
          os.makedirs(OUT, exist_ok=True)

          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "User-Agent": "yousfimh-profile-readme",
          }

          def safe(value):
              return html.escape(str(value), quote=True)

          def fmt(value):
              try:
                  return f"{int(value):,}"
              except Exception:
                  return str(value)

          def graphql(query, variables=None):
              body = json.dumps({"query": query, "variables": variables or {}}).encode()

              req = urllib.request.Request(
                  "https://api.github.com/graphql",
                  data=body,
                  headers={**HEADERS, "Content-Type": "application/json"},
                  method="POST",
              )

              with urllib.request.urlopen(req, timeout=30) as res:
                  payload = json.loads(res.read().decode())

              if payload.get("errors"):
                  raise RuntimeError(payload["errors"])

              return payload["data"]

          def rest_json(url):
              req = urllib.request.Request(url, headers=HEADERS)

              with urllib.request.urlopen(req, timeout=30) as res:
                  return json.loads(res.read().decode())

          today = dt.datetime.now(dt.timezone.utc)
          start = today - dt.timedelta(days=365)

          query = """
          query($from: DateTime!, $to: DateTime!) {
            viewer {
              contributionsCollection(from: $from, to: $to) {
                totalCommitContributions
                totalIssueContributions
                totalPullRequestContributions
                totalPullRequestReviewContributions
                restrictedContributionsCount
                contributionCalendar {
                  totalContributions
                  weeks {
                    contributionDays {
                      date
                      contributionCount
                    }
                  }
                }
              }
            }
          }
          """

          data = graphql(query, {
              "from": start.isoformat(),
              "to": today.isoformat()
          })

          coll = data["viewer"]["contributionsCollection"]
          cal = coll["contributionCalendar"]

          total_contributions = int(cal["totalContributions"])
          commit_contributions = int(coll["totalCommitContributions"])
          pr_contributions = int(coll["totalPullRequestContributions"])
          issue_contributions = int(coll["totalIssueContributions"])
          review_contributions = int(coll["totalPullRequestReviewContributions"])
          restricted_contributions = int(coll["restrictedContributionsCount"])

          repos = []
          page = 1

          while True:
              batch = rest_json(
                  f"https://api.github.com/user/repos?visibility=all&affiliation=owner,collaborator,organization_member&per_page=100&page={page}"
              )

              if not batch:
                  break

              repos.extend(batch)
              page += 1

          private_repo_count = sum(1 for repo in repos if repo.get("private"))
          public_repo_count = sum(1 for repo in repos if not repo.get("private"))
          total_stars = sum(int(repo.get("stargazers_count", 0)) for repo in repos)

          language_bytes = {}

          for repo in repos:
              lang_url = repo.get("languages_url")

              if not lang_url:
                  continue

              try:
                  langs = rest_json(lang_url)
              except Exception:
                  continue

              for lang, size in langs.items():
                  language_bytes[lang] = language_bytes.get(lang, 0) + int(size)

          total_language_bytes = max(1, sum(language_bytes.values()))
          top_languages = sorted(
              language_bytes.items(),
              key=lambda item: item[1],
              reverse=True
          )[:6]

          contribution_days = []

          for week in cal["weeks"]:
              for day in week["contributionDays"]:
                  contribution_days.append({
                      "date": day["date"],
                      "count": int(day["contributionCount"]),
                  })

          contribution_days = sorted(contribution_days, key=lambda day: day["date"])
          last_30 = contribution_days[-30:]

          def write_file(filename, content):
              with open(os.path.join(OUT, filename), "w", encoding="utf-8") as file:
                  file.write(content)

          def css():
              return """
              <style>
                .title { font: 700 20px 'Segoe UI', Ubuntu, Sans-Serif; fill: #58a6ff; }
                .label { font: 600 13px 'Segoe UI', Ubuntu, Sans-Serif; fill: #c9d1d9; }
                .muted { font: 400 12px 'Segoe UI', Ubuntu, Sans-Serif; fill: #8b949e; }
                .value { font: 700 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #58a6ff; }
                .small { font: 600 11px 'Segoe UI', Ubuntu, Sans-Serif; fill: #8b949e; }
              </style>
              """

          def shell(width, height, inner):
              return f"""<svg width="{width}" height="{height}" viewBox="0 0 {width} {height}" fill="none" xmlns="http://www.w3.org/2000/svg">
                {css()}
                <rect width="{width}" height="{height}" rx="8" fill="#0d1117"/>
                <rect x="0.5" y="0.5" width="{width - 1}" height="{height - 1}" rx="7.5" stroke="#30363d"/>
                {inner}
              </svg>"""

          def stats_card():
              rows = [
                  ("★", "Total Stars Earned:", total_stars),
                  ("●", "Total Contributions:", total_contributions),
                  ("⑂", "Commit Contributions:", commit_contributions),
                  ("⑄", "Total PRs:", pr_contributions),
                  ("!", "Total Issues:", issue_contributions),
                  ("▣", "Code Reviews:", review_contributions),
                  ("◈", "Private Repos:", private_repo_count),
                  ("◇", "Public Repos:", public_repo_count),
                  ("◆", "Private/Hidden Count:", restricted_contributions),
              ]

              row_svg = []
              start_y = 58

              for index, (icon, label, value) in enumerate(rows):
                  y = start_y + index * 27

                  row_svg.append(f"""
                    <text x="30" y="{y}" class="value">{safe(icon)}</text>
                    <text x="58" y="{y}" class="label">{safe(label)}</text>
                    <text x="245" y="{y}" class="value">{fmt(value)}</text>
                  """)

              inner = f"""
                <text x="30" y="34" class="title">{safe(DISPLAY_NAME)}'s GitHub Stats</text>
                {''.join(row_svg)}

                <circle cx="455" cy="143" r="50" fill="#161b22" stroke="#30363d"/>
                <circle cx="455" cy="143" r="39" fill="#0d1117" stroke="#58a6ff" stroke-width="6"/>
                <text x="423" y="157" style="font: 700 42px 'Segoe UI', Ubuntu, Sans-Serif; fill:#f0f6fc;">GH</text>
              """

              return shell(520, 310, inner)

          def languages_card():
              colors = [
                  "#58a6ff",
                  "#1f6feb",
                  "#0969da",
                  "#0d419d",
                  "#79c0ff",
                  "#a5d6ff"
              ]

              bar_x = 30
              bar_y = 66
              bar_w = 460
              bar_h = 9

              segments = []
              current_x = bar_x
              lang_rows = []

              if not top_languages:
                  lang_rows.append(
                      '<text x="30" y="120" class="muted">No language data found</text>'
                  )
              else:
                  for i, (lang, size) in enumerate(top_languages):
                      pct = size / total_language_bytes * 100
                      width = max(3, bar_w * size / total_language_bytes)

                      segments.append(
                          f'<rect x="{current_x:.2f}" y="{bar_y}" width="{width:.2f}" height="{bar_h}" fill="{colors[i % len(colors)]}"/>'
                      )

                      current_x += width

                      col = i % 2
                      row = i // 2
                      x = 30 + col * 230
                      y = 112 + row * 34

                      lang_rows.append(f"""
                        <circle cx="{x}" cy="{y - 4}" r="5" fill="{colors[i % len(colors)]}"/>
                        <text x="{x + 14}" y="{y}" class="label">{safe(lang)}</text>
                        <text x="{x + 132}" y="{y}" class="small">{pct:.1f}%</text>
                      """)

              inner = f"""
                <text x="30" y="34" class="title">Most Used Languages</text>

                <clipPath id="clip">
                  <rect x="{bar_x}" y="{bar_y}" width="{bar_w}" height="{bar_h}" rx="4.5"/>
                </clipPath>

                <g clip-path="url(#clip)">
                  {''.join(segments)}
                </g>

                <rect x="{bar_x}" y="{bar_y}" width="{bar_w}" height="{bar_h}" rx="4.5" stroke="#30363d"/>

                {''.join(lang_rows)}
              """

              return shell(520, 210, inner)

          def activity_card():
              counts = [day["count"] for day in last_30]
              labels = [day["date"][5:] for day in last_30]

              max_count = max(counts) if counts else 1
              max_count = max(1, max_count)

              plot_x = 45
              plot_y = 58
              plot_w = 430
              plot_h = 125

              grid = []

              for i in range(5):
                  y = plot_y + i * (plot_h / 4)
                  value = round(max_count - i * (max_count / 4))

                  grid.append(
                      f'<line x1="{plot_x}" y1="{y:.1f}" x2="{plot_x + plot_w}" y2="{y:.1f}" stroke="#21262d"/>'
                  )

                  grid.append(
                      f'<text x="18" y="{y + 4:.1f}" class="small">{value}</text>'
                  )

              points = []

              if counts:
                  step = plot_w / max(1, (len(counts) - 1))

                  for i, count in enumerate(counts):
                      x = plot_x + i * step
                      y = plot_y + plot_h - (count / max_count * plot_h)
                      points.append((x, y))

              polyline = " ".join(f"{x:.1f},{y:.1f}" for x, y in points)

              dots = "".join(
                  f'<circle cx="{x:.1f}" cy="{y:.1f}" r="3.5" fill="#58a6ff"/>'
                  for x, y in points
              )

              x_labels = []

              for idx in [0, 7, 14, 21, 29]:
                  if idx < len(labels) and len(labels) > 1:
                      x = plot_x + idx * (plot_w / (len(labels) - 1))

                      x_labels.append(
                          f'<text x="{x - 12:.1f}" y="206" class="small">{safe(labels[idx])}</text>'
                      )

              inner = f"""
                <text x="30" y="34" class="title">Contribution Activity</text>
                <text x="330" y="34" class="muted">Last 30 days · {fmt(sum(counts))} contributions</text>

                {''.join(grid)}

                <polyline points="{polyline}" fill="none" stroke="#1f6feb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

                {dots}

                {''.join(x_labels)}
              """

              return shell(520, 225, inner)

          write_file("github-private-stats.svg", stats_card())
          write_file("github-private-languages.svg", languages_card())
          write_file("github-private-activity.svg", activity_card())

          print("Generated old-style private stats cards.")
          PY

      - name: Push generated SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
