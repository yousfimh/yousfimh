name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SNK_GITHUB_TOKEN: ${{ secrets.SNK_GITHUB_TOKEN }}

    steps:
      - name: Check token exists
        run: |
          if [ -z "$SNK_GITHUB_TOKEN" ]; then
            echo "Missing SNK_GITHUB_TOKEN secret"
            exit 1
          fi

      - name: Generate beautiful contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: yousfimh
          github_token: ${{ secrets.SNK_GITHUB_TOKEN }}
          outputs: |
            dist/github-snake-light.svg?color_snake=#2563eb&color_dots=#e5e7eb,#93c5fd,#60a5fa,#2563eb,#1d4ed8
            dist/github-snake-dark.svg?color_snake=#facc15&color_dots=#1e293b,#0ea5e9,#22c55e,#a855f7,#f43f5e

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
