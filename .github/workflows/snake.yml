name: Generate Profile SVGs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SNK_GITHUB_TOKEN: ${{ secrets.SNK_GITHUB_TOKEN }}

    steps:
      - name: Check token exists
        run: |
          if [ -z "$SNK_GITHUB_TOKEN" ]; then
            echo "Missing SNK_GITHUB_TOKEN secret"
            exit 1
          fi

      - name: Generate blue contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: yousfimh
          github_token: ${{ secrets.SNK_GITHUB_TOKEN }}
          outputs: |
            dist/github-snake-blue-light.svg?color_snake=%230969da&color_dots=%23ebf5ff,%23cfe8ff,%237cc0ff,%232f81f7,%230969da
            dist/github-snake-blue-dark.svg?color_snake=%2358a6ff&color_dots=%230d1117,%230d419d,%230969da,%231f6feb,%2358a6ff

      - name: Generate old-style private stats
        run: |
          python3 <<'PY'
          import os
          import json
          import html
          import urllib.request
          import datetime as dt

          TOKEN = os.environ["SNK_GITHUB_TOKEN"]
          OUT = "dist"
          os.makedirs(OUT, exist_ok=True)

          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "User-Agent": "yousfimh-profile-readme"
          }

          LANG_COLORS = {
              "TypeScript": "#3178c6",
              "JavaScript": "#f1e05a",
              "CSS": "#563d7c",
              "HTML": "#e34c26",
              "Python": "#3572A5",
              "Java": "#b07219",
              "C": "#555555",
              "C++": "#f34b7d",
              "Rust": "#dea584",
              "PLpgSQL": "#336790",
              "Astro": "#ff5d01"
          }

          FALLBACK_COLORS = [
              "#58a6ff",
              "#1f6feb",
              "#8957e5",
              "#f1e05a",
              "#3fb950",
              "#f78166",
              "#79c0ff",
              "#a5d6ff"
          ]

          def safe(value):
              return html.escape(str(value), quote=True)

          def fmt(value):
              return f"{int(value):,}"

          def graphql(query, variables=None):
              body = json.dumps({
                  "query": query,
                  "variables": variables or {}
              }).encode("utf-8")

              req = urllib.request.Request(
                  "https://api.github.com/graphql",
                  data=body,
                  headers={**HEADERS, "Content-Type": "application/json"},
                  method="POST"
              )

              with urllib.request.urlopen(req, timeout=30) as res:
                  payload = json.loads(res.read().decode("utf-8"))

              if payload.get("errors"):
                  raise RuntimeError(payload["errors"])

              return payload["data"]

          def rest_json(url):
              req = urllib.request.Request(url, headers=HEADERS)

              with urllib.request.urlopen(req, timeout=30) as res:
                  return json.loads(res.read().decode("utf-8"))

          today = dt.datetime.now(dt.timezone.utc)
          start = today - dt.timedelta(days=365)

          query = """
          query($from: DateTime!, $to: DateTime!) {
            viewer {
              contributionsCollection(from: $from, to: $to) {
                totalCommitContributions
                totalIssueContributions
                totalPullRequestContributions
                totalPullRequestReviewContributions
                restrictedContributionsCount
                contributionCalendar {
                  totalContributions
                  weeks {
                    contributionDays {
                      date
                      contributionCount
                    }
                  }
                }
              }
            }
          }
          """

          data = graphql(query, {
              "from": start.isoformat(),
              "to": today.isoformat()
          })

          collection = data["viewer"]["contributionsCollection"]
          calendar = collection["contributionCalendar"]

          total_contributions = int(calendar["totalContributions"])
          commit_contributions = int(collection["totalCommitContributions"])
          pr_contributions = int(collection["totalPullRequestContributions"])
          issue_contributions = int(collection["totalIssueContributions"])
          review_contributions = int(collection["totalPullRequestReviewContributions"])
          hidden_contributions = int(collection["restrictedContributionsCount"])

          repos = []
          page = 1

          while True:
              url = f"https://api.github.com/user/repos?visibility=all&affiliation=owner,collaborator,organization_member&per_page=100&page={page}"
              batch = rest_json(url)

              if not batch:
                  break

              repos.extend(batch)
              page += 1

          total_stars = sum(int(repo.get("stargazers_count", 0)) for repo in repos)

          language_bytes = {}

          for repo in repos:
              lang_url = repo.get("languages_url")

              if not lang_url:
                  continue

              try:
                  langs = rest_json(lang_url)
              except Exception:
                  continue

              for lang, size in langs.items():
                  language_bytes[lang] = language_bytes.get(lang, 0) + int(size)

          total_language_bytes = max(1, sum(language_bytes.values()))
          top_languages = sorted(
              language_bytes.items(),
              key=lambda item: item[1],
              reverse=True
          )[:8]

          contribution_days = []

          for week in calendar["weeks"]:
              for day in week["contributionDays"]:
                  contribution_days.append({
                      "date": day["date"],
                      "count": int(day["contributionCount"])
                  })

          contribution_days = sorted(contribution_days, key=lambda day: day["date"])

          def write_file(name, content):
              with open(os.path.join(OUT, name), "w", encoding="utf-8") as file:
                  file.write(content)

          def date_label(date_string):
              d = dt.date.fromisoformat(date_string)
              return d.strftime("%b %-d")

          def calculate_streaks(days):
              parsed = [
                  (dt.date.fromisoformat(day["date"]), int(day["count"]))
                  for day in days
              ]

              parsed.sort(key=lambda item: item[0])

              current = 0
              current_start = None
              current_end = None

              for d, count in reversed(parsed):
                  if count > 0:
                      if current == 0:
                          current_end = d
                      current_start = d
                      current += 1
                  else:
                      break

              longest = 0
              longest_start = None
              longest_end = None
              running = 0
              running_start = None

              for d, count in parsed:
                  if count > 0:
                      if running == 0:
                          running_start = d

                      running += 1

                      if running > longest:
                          longest = running
                          longest_start = running_start
                          longest_end = d
                  else:
                      running = 0
                      running_start = None

              def label_range(start_date, end_date, value):
                  if value == 0:
                      return "No streak"

                  if value == 1:
                      return start_date.strftime("%b %-d")

                  return f"{start_date.strftime('%b %-d')} - {end_date.strftime('%b %-d')}"

              current_range = label_range(current_start, current_end, current)
              longest_range = label_range(longest_start, longest_end, longest)

              return current, current_range, longest, longest_range

          current_streak, current_range, longest_streak, longest_range = calculate_streaks(contribution_days)

          start_label = date_label(contribution_days[0]["date"])
          end_label = "Present"

          def css():
              return """
              <style>
                .title {
                  font: 700 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, sans-serif;
                  fill: #58a6ff;
                }

                .label {
                  font: 600 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, sans-serif;
                  fill: #c9d1d9;
                }

                .muted {
                  font: 400 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, sans-serif;
                  fill: #8b949e;
                }

                .big {
                  font: 700 28px -apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, sans-serif;
                  fill: #58a6ff;
                }

                .white {
                  font: 700 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, sans-serif;
                  fill: #f0f6fc;
                }

                .small {
                  font: 500 10px -apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, sans-serif;
                  fill: #8b949e;
                }
              </style>
              """

          def shell(width, height, inner):
              return f"""<svg width="{width}" height="{height}" viewBox="0 0 {width} {height}" fill="none" xmlns="http://www.w3.org/2000/svg">
                {css()}
                <rect width="{width}" height="{height}" rx="8" fill="#0d1117"/>
                {inner}
              </svg>"""

          def stats_card():
              rows = [
                  ("✧", "Total Stars Earned:", total_stars),
                  ("◷", "Total Commits:", commit_contributions),
                  ("⑂", "Total PRs:", pr_contributions),
                  ("ⓘ", "Total Issues:", issue_contributions),
                  ("▣", "Total Contributions:", total_contributions),
              ]

              row_svg = []
              y_start = 56

              for i, (icon, label, value) in enumerate(rows):
                  y = y_start + i * 25

                  row_svg.append(f"""
                    <text x="32" y="{y}" class="title">{safe(icon)}</text>
                    <text x="58" y="{y}" class="label">{safe(label)}</text>
                    <text x="255" y="{y}" class="label">{fmt(value)}</text>
                  """)

              inner = f"""
                <text x="32" y="31" class="title">Yousfi Mohamed Houssam's GitHub Stats</text>

                {''.join(row_svg)}

                <circle cx="865" cy="111" r="48" fill="#161b22" stroke="#30363d"/>
                <circle cx="865" cy="111" r="36" fill="#0d1117" stroke="#58a6ff" stroke-width="6"/>
                <text x="829" y="125" style="font: 800 42px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill:#f0f6fc;">GH</text>
              """

              return shell(1000, 210, inner)

          def streak_card():
              inner = f"""
                <line x1="330" y1="42" x2="330" y2="180" stroke="#8b949e" stroke-width="2"/>
                <line x1="670" y1="42" x2="670" y2="180" stroke="#8b949e" stroke-width="2"/>

                <text x="170" y="88" text-anchor="middle" class="big">{fmt(total_contributions)}</text>
                <text x="170" y="121" text-anchor="middle" class="white">Total Contributions</text>
                <text x="170" y="151" text-anchor="middle" class="muted">{safe(start_label)} - {safe(end_label)}</text>

                <circle cx="500" cy="95" r="43" fill="#0d1117" stroke="#1f6feb" stroke-width="6"/>
                <text x="500" y="105" text-anchor="middle" style="font: 700 28px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill:#f0f6fc;">{fmt(current_streak)}</text>
                <text x="500" y="158" text-anchor="middle" class="white">Current Streak</text>
                <text x="500" y="184" text-anchor="middle" class="muted">{safe(current_range)}</text>

                <text x="830" y="88" text-anchor="middle" class="big">{fmt(longest_streak)}</text>
                <text x="830" y="121" text-anchor="middle" class="white">Longest Streak</text>
                <text x="830" y="151" text-anchor="middle" class="muted">{safe(longest_range)}</text>
              """

              return shell(1000, 220, inner)

          def languages_card():
              bar_x = 32
              bar_y = 66
              bar_w = 936
              bar_h = 8

              segments = []
              legends = []
              current_x = bar_x

              for i, (lang, size) in enumerate(top_languages):
                  pct = size / total_language_bytes * 100
                  color = LANG_COLORS.get(lang, FALLBACK_COLORS[i % len(FALLBACK_COLORS)])
                  width = max(3, bar_w * size / total_language_bytes)

                  segments.append(
                      f'<rect x="{current_x:.2f}" y="{bar_y}" width="{width:.2f}" height="{bar_h}" fill="{color}"/>'
                  )

                  current_x += width

                  col = i % 4
                  row = i // 4

                  x = 32 + col * 235
                  y = 105 + row * 30

                  legends.append(f"""
                    <circle cx="{x}" cy="{y - 4}" r="5" fill="{color}"/>
                    <text x="{x + 14}" y="{y}" class="small">{safe(lang)} {pct:.2f}%</text>
                  """)

              inner = f"""
                <text x="32" y="34" class="title">Most Used Languages</text>

                <clipPath id="langBar">
                  <rect x="{bar_x}" y="{bar_y}" width="{bar_w}" height="{bar_h}" rx="4"/>
                </clipPath>

                <g clip-path="url(#langBar)">
                  {''.join(segments)}
                </g>

                <rect x="{bar_x}" y="{bar_y}" width="{bar_w}" height="{bar_h}" rx="4" stroke="#30363d"/>

                {''.join(legends)}
              """

              return shell(1000, 155, inner)

          write_file("github-private-stats-clean.svg", stats_card())
          write_file("github-private-streak-clean.svg", streak_card())
          write_file("github-private-languages-clean.svg", languages_card())

          print("Generated clean private stats.")
          PY

      - name: Push generated SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
