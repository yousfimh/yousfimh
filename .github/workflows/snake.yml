name: Generate Profile SVGs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SNK_GITHUB_TOKEN: ${{ secrets.SNK_GITHUB_TOKEN }}

    steps:
      - name: Check token exists
        run: |
          if [ -z "$SNK_GITHUB_TOKEN" ]; then
            echo "Missing SNK_GITHUB_TOKEN secret"
            exit 1
          fi

      - name: Generate blue contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: yousfimh
          github_token: ${{ secrets.SNK_GITHUB_TOKEN }}
          outputs: |
            dist/github-snake-blue-light.svg?color_snake=%230969da&color_dots=%23ebf5ff,%23cfe8ff,%237cc0ff,%232f81f7,%230969da
            dist/github-snake-blue-dark.svg?color_snake=%2358a6ff&color_dots=%230d1117,%230d419d,%230969da,%231f6feb,%2358a6ff

      - name: Generate private GitHub stats cards
        run: |
          python3 <<'PY'
          import os
          import json
          import html
          import urllib.request
          import datetime as dt

          TOKEN = os.environ["SNK_GITHUB_TOKEN"]
          DISPLAY_NAME = "Yousfi Mohamed Houssam"
          OUT = "dist"
          os.makedirs(OUT, exist_ok=True)

          API_HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "User-Agent": "yousfimh-profile-readme"
          }

          def safe(text):
              return html.escape(str(text), quote=True)

          def fmt(num):
              try:
                  return f"{int(num):,}"
              except Exception:
                  return str(num)

          def graphql(query, variables=None):
              body = json.dumps({
                  "query": query,
                  "variables": variables or {}
              }).encode("utf-8")

              req = urllib.request.Request(
                  "https://api.github.com/graphql",
                  data=body,
                  headers={**API_HEADERS, "Content-Type": "application/json"},
                  method="POST"
              )

              with urllib.request.urlopen(req, timeout=30) as res:
                  payload = json.loads(res.read().decode("utf-8"))

              if payload.get("errors"):
                  raise RuntimeError(payload["errors"])

              return payload["data"]

          def rest_json(url):
              req = urllib.request.Request(url, headers=API_HEADERS)

              with urllib.request.urlopen(req, timeout=30) as res:
                  return json.loads(res.read().decode("utf-8"))

          today = dt.datetime.now(dt.timezone.utc)
          start = today - dt.timedelta(days=365)

          query = """
          query($from: DateTime!, $to: DateTime!) {
            viewer {
              login
              name
              contributionsCollection(from: $from, to: $to) {
                totalCommitContributions
                totalIssueContributions
                totalPullRequestContributions
                totalPullRequestReviewContributions
                restrictedContributionsCount
                contributionCalendar {
                  totalContributions
                  weeks {
                    contributionDays {
                      date
                      contributionCount
                    }
                  }
                }
              }
            }
          }
          """

          data = graphql(query, {
              "from": start.isoformat(),
              "to": today.isoformat()
          })

          viewer = data["viewer"]
          coll = viewer["contributionsCollection"]
          cal = coll["contributionCalendar"]

          total_contributions = cal["totalContributions"]
          commit_contributions = coll["totalCommitContributions"]
          pr_contributions = coll["totalPullRequestContributions"]
          issue_contributions = coll["totalIssueContributions"]
          review_contributions = coll["totalPullRequestReviewContributions"]
          restricted_contributions = coll["restrictedContributionsCount"]

          repos = []
          page = 1

          while True:
              url = f"https://api.github.com/user/repos?visibility=all&affiliation=owner&per_page=100&page={page}"
              batch = rest_json(url)

              if not batch:
                  break

              repos.extend(batch)
              page += 1

          repo_count = len(repos)
          private_repo_count = sum(1 for repo in repos if repo.get("private"))
          total_stars = sum(int(repo.get("stargazers_count", 0)) for repo in repos)

          language_bytes = {}

          for repo in repos:
              lang_url = repo.get("languages_url")

              if not lang_url:
                  continue

              try:
                  langs = rest_json(lang_url)
              except Exception:
                  continue

              for name, size in langs.items():
                  language_bytes[name] = language_bytes.get(name, 0) + int(size)

          total_language_bytes = sum(language_bytes.values())
          top_languages = sorted(
              language_bytes.items(),
              key=lambda item: item[1],
              reverse=True
          )[:8]

          contribution_days = []

          for week in cal["weeks"]:
              for day in week["contributionDays"]:
                  contribution_days.append({
                      "date": day["date"],
                      "count": int(day["contributionCount"])
                  })

          contribution_days = sorted(contribution_days, key=lambda day: day["date"])
          last_30 = contribution_days[-30:] if len(contribution_days) >= 30 else contribution_days

          def write_file(name, content):
              with open(os.path.join(OUT, name), "w", encoding="utf-8") as file:
                  file.write(content)

          def stats_card():
              items = [
                  ("Total contributions", total_contributions),
                  ("Commit contributions", commit_contributions),
                  ("Pull requests", pr_contributions),
                  ("Issues", issue_contributions),
                  ("Code reviews", review_contributions),
                  ("Private/hidden count", restricted_contributions),
                  ("Repositories", repo_count),
                  ("Private repositories", private_repo_count),
                  ("Total stars", total_stars),
              ]

              boxes = []

              for i, (label, value) in enumerate(items):
                  col = i % 3
                  row = i // 3
                  x = 40 + col * 310
                  y = 100 + row * 72

                  boxes.append(f"""
                    <rect x="{x}" y="{y}" width="285" height="56" rx="12" fill="#161b22" stroke="#30363d"/>
                    <text x="{x + 18}" y="{y + 24}" font-size="14" fill="#8b949e">{safe(label)}</text>
                    <text x="{x + 18}" y="{y + 46}" font-size="24" font-weight="700" fill="#58a6ff">{fmt(value)}</text>
                  """)

              return f"""<svg width="1000" height="345" viewBox="0 0 1000 345" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="topGlow" x1="0" y1="0" x2="1000" y2="0">
                    <stop offset="0%" stop-color="#0d1117"/>
                    <stop offset="50%" stop-color="#0d419d"/>
                    <stop offset="100%" stop-color="#58a6ff"/>
                  </linearGradient>
                </defs>

                <rect width="1000" height="345" rx="18" fill="#0d1117"/>
                <rect x="1" y="1" width="998" height="343" rx="18" stroke="#30363d"/>
                <rect x="30" y="28" width="940" height="6" rx="3" fill="url(#topGlow)"/>

                <text x="40" y="66" font-size="28" font-weight="700" fill="#f0f6fc">{safe(DISPLAY_NAME)}'s GitHub Stats</text>
                <text x="40" y="88" font-size="14" fill="#8b949e">Generated in GitHub Actions, so it includes private + public contribution counts.</text>

                {''.join(boxes)}
              </svg>"""

          def languages_card():
              colors = [
                  "#58a6ff",
                  "#1f6feb",
                  "#0969da",
                  "#0d419d",
                  "#388bfd",
                  "#79c0ff",
                  "#a5d6ff",
                  "#cfe8ff"
              ]

              if not top_languages or total_language_bytes == 0:
                  rows = '<text x="40" y="145" font-size="18" fill="#8b949e">No language data found.</text>'
                  bar = ""
              else:
                  x = 40
                  y = 112
                  bar_parts = []

                  for idx, (_, size) in enumerate(top_languages):
                      w = max(4, 920 * size / total_language_bytes)
                      bar_parts.append(
                          f'<rect x="{x:.2f}" y="{y}" width="{w:.2f}" height="18" fill="{colors[idx % len(colors)]}"/>'
                      )
                      x += w

                  rows_list = []

                  for idx, (name, size) in enumerate(top_languages):
                      pct = 100 * size / total_language_bytes
                      col = idx % 2
                      row = idx // 2
                      lx = 40 + col * 455
                      ly = 165 + row * 32

                      rows_list.append(f"""
                        <circle cx="{lx}" cy="{ly - 5}" r="6" fill="{colors[idx % len(colors)]}"/>
                        <text x="{lx + 18}" y="{ly}" font-size="16" fill="#f0f6fc">{safe(name)}</text>
                        <text x="{lx + 180}" y="{ly}" font-size="15" fill="#8b949e">{pct:.1f}%</text>
                      """)

                  rows = "".join(rows_list)

                  bar = f"""
                    <clipPath id="barClip">
                      <rect x="40" y="112" width="920" height="18" rx="9"/>
                    </clipPath>

                    <g clip-path="url(#barClip)">
                      {''.join(bar_parts)}
                    </g>

                    <rect x="40" y="112" width="920" height="18" rx="9" stroke="#30363d"/>
                  """

              return f"""<svg width="1000" height="310" viewBox="0 0 1000 310" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="1000" height="310" rx="18" fill="#0d1117"/>
                <rect x="1" y="1" width="998" height="308" rx="18" stroke="#30363d"/>

                <text x="40" y="60" font-size="28" font-weight="700" fill="#f0f6fc">Most Used Languages</text>
                <text x="40" y="84" font-size="14" fill="#8b949e">Calculated from repositories visible to your token, including private repositories.</text>

                {bar}
                {rows}
              </svg>"""

          def activity_card():
              counts = [day["count"] for day in last_30]
              labels = [day["date"][5:] for day in last_30]

              max_count = max(counts) if counts else 1
              max_count = max(1, max_count)

              plot_x = 70
              plot_y = 95
              plot_w = 860
              plot_h = 145

              grid = []

              for i in range(5):
                  yy = plot_y + i * (plot_h / 4)
                  value = round(max_count - i * (max_count / 4))

                  grid.append(
                      f'<line x1="{plot_x}" y1="{yy:.2f}" x2="{plot_x + plot_w}" y2="{yy:.2f}" stroke="#21262d"/>'
                  )
                  grid.append(
                      f'<text x="35" y="{yy + 5:.2f}" font-size="12" fill="#8b949e">{value}</text>'
                  )

              points = []

              if len(counts) == 1:
                  points.append((plot_x, plot_y + plot_h - (counts[0] / max_count * plot_h)))
              elif counts:
                  step = plot_w / (len(counts) - 1)

                  for i, count in enumerate(counts):
                      x = plot_x + i * step
                      y = plot_y + plot_h - (count / max_count * plot_h)
                      points.append((x, y))

              polyline = " ".join(f"{x:.2f},{y:.2f}" for x, y in points)

              circles = "".join(
                  f'<circle cx="{x:.2f}" cy="{y:.2f}" r="4.5" fill="#58a6ff"/>'
                  for x, y in points
              )

              x_labels = []

              if labels:
                  for idx in [0, 7, 14, 21, 29]:
                      if idx < len(labels):
                          if len(labels) == 1:
                              x = plot_x
                          else:
                              x = plot_x + idx * (plot_w / (len(labels) - 1))

                          x_labels.append(
                              f'<text x="{x - 16:.2f}" y="268" font-size="12" fill="#8b949e">{safe(labels[idx])}</text>'
                          )

              total_last_30 = sum(counts)

              return f"""<svg width="1000" height="300" viewBox="0 0 1000 300" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="1000" height="300" rx="18" fill="#0d1117"/>
                <rect x="1" y="1" width="998" height="298" rx="18" stroke="#30363d"/>

                <text x="40" y="55" font-size="28" font-weight="700" fill="#f0f6fc">Contribution Activity</text>
                <text x="40" y="78" font-size="14" fill="#8b949e">Last 30 days · {fmt(total_last_30)} contributions</text>

                {''.join(grid)}
                <polyline points="{polyline}" fill="none" stroke="#1f6feb" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                {circles}
                {''.join(x_labels)}
              </svg>"""

          write_file("github-private-stats.svg", stats_card())
          write_file("github-private-languages.svg", languages_card())
          write_file("github-private-activity.svg", activity_card())

          print("Generated private GitHub stats SVGs.")
          PY

      - name: Push generated SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
