name: Generate Profile SVGs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SNK_GITHUB_TOKEN: ${{ secrets.SNK_GITHUB_TOKEN }}

    steps:
      - name: Check token exists
        run: |
          if [ -z "$SNK_GITHUB_TOKEN" ]; then
            echo "Missing SNK_GITHUB_TOKEN secret"
            exit 1
          fi

      - name: Generate blue contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: yousfimh
          github_token: ${{ secrets.SNK_GITHUB_TOKEN }}
          outputs: |
            dist/github-snake-blue-light.svg?color_snake=%230969da&color_dots=%23ebf5ff,%23cfe8ff,%237cc0ff,%232f81f7,%230969da
            dist/github-snake-blue-dark.svg?color_snake=%2358a6ff&color_dots=%230d1117,%230d419d,%230969da,%231f6feb,%2358a6ff

      - name: Generate modern private stats
        run: |
          python3 <<'PY'
          import os
          import json
          import html
          import urllib.request
          import datetime as dt

          TOKEN = os.environ["SNK_GITHUB_TOKEN"]
          OUT = "dist"
          os.makedirs(OUT, exist_ok=True)

          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "User-Agent": "yousfimh-profile-readme"
          }

          def safe(value):
              return html.escape(str(value), quote=True)

          def fmt(value):
              return f"{int(value):,}"

          def graphql(query, variables=None):
              body = json.dumps({
                  "query": query,
                  "variables": variables or {}
              }).encode("utf-8")

              req = urllib.request.Request(
                  "https://api.github.com/graphql",
                  data=body,
                  headers={**HEADERS, "Content-Type": "application/json"},
                  method="POST"
              )

              with urllib.request.urlopen(req, timeout=30) as res:
                  payload = json.loads(res.read().decode("utf-8"))

              if payload.get("errors"):
                  raise RuntimeError(payload["errors"])

              return payload["data"]

          def rest_json(url):
              req = urllib.request.Request(url, headers=HEADERS)

              with urllib.request.urlopen(req, timeout=30) as res:
                  return json.loads(res.read().decode("utf-8"))

          today = dt.datetime.now(dt.timezone.utc)
          start = today - dt.timedelta(days=365)

          query = """
          query($from: DateTime!, $to: DateTime!) {
            viewer {
              contributionsCollection(from: $from, to: $to) {
                totalCommitContributions
                totalIssueContributions
                totalPullRequestContributions
                totalPullRequestReviewContributions
                restrictedContributionsCount
                contributionCalendar {
                  totalContributions
                  weeks {
                    contributionDays {
                      date
                      contributionCount
                    }
                  }
                }
              }
            }
          }
          """

          data = graphql(query, {
              "from": start.isoformat(),
              "to": today.isoformat()
          })

          collection = data["viewer"]["contributionsCollection"]
          calendar = collection["contributionCalendar"]

          total_contributions = int(calendar["totalContributions"])
          commit_contributions = int(collection["totalCommitContributions"])
          pr_contributions = int(collection["totalPullRequestContributions"])
          issue_contributions = int(collection["totalIssueContributions"])
          review_contributions = int(collection["totalPullRequestReviewContributions"])
          hidden_contributions = int(collection["restrictedContributionsCount"])

          repos = []
          page = 1

          while True:
              url = f"https://api.github.com/user/repos?visibility=all&affiliation=owner,collaborator,organization_member&per_page=100&page={page}"
              batch = rest_json(url)

              if not batch:
                  break

              repos.extend(batch)
              page += 1

          total_repos = len(repos)
          private_repos = sum(1 for repo in repos if repo.get("private"))
          public_repos = total_repos - private_repos
          total_stars = sum(int(repo.get("stargazers_count", 0)) for repo in repos)

          language_bytes = {}

          for repo in repos:
              lang_url = repo.get("languages_url")

              if not lang_url:
                  continue

              try:
                  langs = rest_json(lang_url)
              except Exception:
                  continue

              for lang, size in langs.items():
                  language_bytes[lang] = language_bytes.get(lang, 0) + int(size)

          total_language_bytes = max(1, sum(language_bytes.values()))
          top_languages = sorted(
              language_bytes.items(),
              key=lambda item: item[1],
              reverse=True
          )[:6]

          contribution_days = []

          for week in calendar["weeks"]:
              for day in week["contributionDays"]:
                  contribution_days.append({
                      "date": day["date"],
                      "count": int(day["contributionCount"])
                  })

          contribution_days = sorted(contribution_days, key=lambda day: day["date"])
          last_30 = contribution_days[-30:]

          def write_file(name, content):
              with open(os.path.join(OUT, name), "w", encoding="utf-8") as file:
                  file.write(content)

          def base_css():
              return """
              <style>
                .title {
                  font: 700 26px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                  fill: #f0f6fc;
                }

                .subtitle {
                  font: 400 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                  fill: #8b949e;
                }

                .label {
                  font: 500 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                  fill: #8b949e;
                }

                .value {
                  font: 700 30px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                  fill: #58a6ff;
                }

                .small {
                  font: 500 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                  fill: #c9d1d9;
                }
              </style>
              """

          def modern_shell(width, height, content):
              return f"""<svg width="{width}" height="{height}" viewBox="0 0 {width} {height}" fill="none" xmlns="http://www.w3.org/2000/svg">
                {base_css()}

                <defs>
                  <linearGradient id="line" x1="0" y1="0" x2="{width}" y2="0">
                    <stop offset="0%" stop-color="#58a6ff"/>
                    <stop offset="50%" stop-color="#1f6feb"/>
                    <stop offset="100%" stop-color="#0d419d"/>
                  </linearGradient>
                </defs>

                <rect width="{width}" height="{height}" rx="18" fill="#0d1117"/>
                <rect x="0.5" y="0.5" width="{width - 1}" height="{height - 1}" rx="17.5" stroke="#30363d"/>
                <rect x="28" y="26" width="{width - 56}" height="4" rx="2" fill="url(#line)"/>

                {content}
              </svg>"""

          def stat_box(x, y, w, h, label, value):
              return f"""
                <rect x="{x}" y="{y}" width="{w}" height="{h}" rx="14" fill="#161b22" stroke="#30363d"/>
                <text x="{x + 22}" y="{y + 32}" class="label">{safe(label)}</text>
                <text x="{x + 22}" y="{y + 72}" class="value">{safe(value)}</text>
              """

          def stats_card():
              content = f"""
                <text x="40" y="72" class="title">GitHub Stats</text>
                <text x="40" y="98" class="subtitle">Private + public activity generated from GitHub Actions</text>

                {stat_box(40, 130, 210, 100, "Contributions", fmt(total_contributions))}
                {stat_box(270, 130, 210, 100, "Commits", fmt(commit_contributions))}
                {stat_box(500, 130, 210, 100, "Repositories", fmt(total_repos))}
                {stat_box(730, 130, 210, 100, "Stars", fmt(total_stars))}

                <rect x="40" y="260" width="900" height="76" rx="14" fill="#161b22" stroke="#30363d"/>

                <text x="70" y="295" class="label">Pull Requests</text>
                <text x="70" y="321" class="small">{fmt(pr_contributions)}</text>

                <text x="230" y="295" class="label">Issues</text>
                <text x="230" y="321" class="small">{fmt(issue_contributions)}</text>

                <text x="390" y="295" class="label">Code Reviews</text>
                <text x="390" y="321" class="small">{fmt(review_contributions)}</text>

                <text x="570" y="295" class="label">Private Repos</text>
                <text x="570" y="321" class="small">{fmt(private_repos)}</text>

                <text x="750" y="295" class="label">Public Repos</text>
                <text x="750" y="321" class="small">{fmt(public_repos)}</text>
              """

              return modern_shell(1000, 370, content)

          def languages_card():
              colors = [
                  "#58a6ff",
                  "#1f6feb",
                  "#0969da",
                  "#0d419d",
                  "#79c0ff",
                  "#a5d6ff"
              ]

              bar_x = 40
              bar_y = 118
              bar_w = 920
              bar_h = 18
              current_x = bar_x
              segments = []
              rows = []

              for i, (lang, size) in enumerate(top_languages):
                  pct = size / total_language_bytes * 100
                  width = max(4, bar_w * size / total_language_bytes)

                  segments.append(
                      f'<rect x="{current_x:.2f}" y="{bar_y}" width="{width:.2f}" height="{bar_h}" fill="{colors[i % len(colors)]}"/>'
                  )

                  current_x += width

                  col = i % 3
                  row = i // 3
                  x = 45 + col * 310
                  y = 185 + row * 42

                  rows.append(f"""
                    <circle cx="{x}" cy="{y - 5}" r="6" fill="{colors[i % len(colors)]}"/>
                    <text x="{x + 18}" y="{y}" class="small">{safe(lang)}</text>
                    <text x="{x + 150}" y="{y}" class="label">{pct:.1f}%</text>
                  """)

              content = f"""
                <text x="40" y="72" class="title">Most Used Languages</text>
                <text x="40" y="98" class="subtitle">Calculated from public + private repositories visible to your token</text>

                <clipPath id="bar">
                  <rect x="{bar_x}" y="{bar_y}" width="{bar_w}" height="{bar_h}" rx="9"/>
                </clipPath>

                <g clip-path="url(#bar)">
                  {''.join(segments)}
                </g>

                <rect x="{bar_x}" y="{bar_y}" width="{bar_w}" height="{bar_h}" rx="9" stroke="#30363d"/>

                {''.join(rows)}
              """

              return modern_shell(1000, 290, content)

          def activity_card():
              counts = [day["count"] for day in last_30]
              labels = [day["date"][5:] for day in last_30]

              max_count = max(counts) if counts else 1
              max_count = max(1, max_count)

              plot_x = 70
              plot_y = 115
              plot_w = 860
              plot_h = 150

              grid = []

              for i in range(5):
                  y = plot_y + i * (plot_h / 4)
                  value = round(max_count - i * (max_count / 4))

                  grid.append(
                      f'<line x1="{plot_x}" y1="{y:.1f}" x2="{plot_x + plot_w}" y2="{y:.1f}" stroke="#21262d"/>'
                  )

                  grid.append(
                      f'<text x="38" y="{y + 4:.1f}" class="label">{value}</text>'
                  )

              points = []

              if counts:
                  step = plot_w / max(1, len(counts) - 1)

                  for i, count in enumerate(counts):
                      x = plot_x + i * step
                      y = plot_y + plot_h - (count / max_count * plot_h)
                      points.append((x, y))

              polyline = " ".join(f"{x:.1f},{y:.1f}" for x, y in points)

              dots = "".join(
                  f'<circle cx="{x:.1f}" cy="{y:.1f}" r="4" fill="#58a6ff"/>'
                  for x, y in points
              )

              x_labels = []

              for idx in [0, 7, 14, 21, 29]:
                  if idx < len(labels) and len(labels) > 1:
                      x = plot_x + idx * (plot_w / (len(labels) - 1))

                      x_labels.append(
                          f'<text x="{x - 16:.1f}" y="300" class="label">{safe(labels[idx])}</text>'
                      )

              content = f"""
                <text x="40" y="72" class="title">Contribution Activity</text>
                <text x="40" y="98" class="subtitle">Last 30 days · {fmt(sum(counts))} contributions</text>

                {''.join(grid)}

                <polyline points="{polyline}" fill="none" stroke="#1f6feb" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

                {dots}

                {''.join(x_labels)}
              """

              return modern_shell(1000, 330, content)

          write_file("github-private-stats-modern.svg", stats_card())
          write_file("github-private-languages-modern.svg", languages_card())
          write_file("github-private-activity-modern.svg", activity_card())

          print("Generated modern private stats SVGs.")
          PY

      - name: Push generated SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
